<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recipe">
    <meta property="og:title" content="Recipe">
    <meta property="og:description" content="Recipe">
    <meta property="og:type" content="article">
    <title>Recipe</title>
    <script>
    (function() {
        var path = location.pathname;
        var root = path;
        var recipesIdx = path.indexOf('/recipes/');
        if (recipesIdx !== -1) root = path.slice(0, recipesIdx + 1);
        else root = path.replace(/\/[^/]*$/, '') || '/';
        if (!root.endsWith('/')) root += '/';
        var base = document.createElement('base');
        base.href = location.origin + root;
        document.head.insertBefore(base, document.head.firstChild);
    })();
    </script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/button-styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div id="branding">
                <h1 data-i18n="my_recipe_journal">My Recipe Journal</h1>
            </div>
            <div class="language-switcher">
                <button class="language-toggle" id="language-toggle">
                    <span class="current-lang">English</span>
                    <span class="toggle-icon">🌍</span>
                </button>
                <div class="language-menu" id="language-menu"></div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <nav class="breadcrumb" id="recipe-breadcrumb" aria-label="Breadcrumb"></nav>
        <div id="recipe-content">
            <p>Loading recipe...</p>
        </div>
    </div>
    
    <script src="js/i18n-config.js"></script>
    <script src="js/cookbook-common.js"></script>
    <script src="js/recipeDetailViewer.min.js"></script>
</body>
</html>

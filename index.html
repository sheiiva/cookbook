<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="Browse recipes by category and dietary options. Multilingual recipe journal in English, French, and Spanish.">
    <meta property="og:title" content="My Recipe Journal">
    <meta property="og:description" content="Browse recipes by category and dietary options. Multilingual recipe journal in English, French, and Spanish.">
    <meta property="og:type" content="website">
    <title>My Recipe Journal</title>
    <script>
    (function() {
        var p = location.pathname.replace(/\/[^/]*$/, '') || '/';
        if (!p.endsWith('/')) p += '/';
        var base = document.createElement('base');
        base.href = location.origin + p;
        document.head.insertBefore(base, document.head.firstChild);
    })();
    </script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/button-styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div id="branding">
                <h1 data-i18n="my_recipe_journal">My Recipe Journal</h1>
            </div>
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search recipes..." data-i18n="search_placeholder">
            </div>
            <div class="language-switcher">
                <button class="language-toggle" id="language-toggle">
                    <span class="current-lang">English</span>
                    <span class="toggle-icon">🌍</span>
                </button>
                <div class="language-menu" id="language-menu">
                    <!-- Language options will be loaded dynamically -->
                </div>
            </div>
        </div>
    </header>
    
    <!-- Filter Bar: populated from data/cookbook-data-*.json (single source) -->
    <div class="filter-bar">
        <div class="filter-content" id="filter-content"></div>
    </div>
    
    <!-- Recipes will be loaded dynamically from data/cookbook-data-*.json -->
    
    <script src="js/i18n-config.js"></script>
    <script src="js/recipeLoader.min.js"></script>
    <script>
        // Debug script to help identify issues
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            console.error('Unhandled promise rejection:', e.reason);
        });
        
        // Initialize RecipeLoader
        document.addEventListener('DOMContentLoaded', function() {
            const recipeLoader = new RecipeLoader();
            recipeLoader.init();
        });
    </script>
</body>
</html>
